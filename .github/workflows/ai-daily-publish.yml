name: AI Daily Publish

on:
  schedule:
    - cron: '0 15 * * *' # 每天 UTC 15:00 = 北京时间 23:00；只发布一篇，覆盖主源当天完整推送内容
  workflow_dispatch:




jobs:
  publish-ai-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run AI daily pipeline
        env:
          NOTION_ACCESS_TOKEN: ${{ secrets.NOTION_ACCESS_TOKEN }}
          AI_DAILY_NOTION_DATABASE_ID: ${{ secrets.AI_DAILY_NOTION_DATABASE_ID }}
          AI_DAILY_API: ${{ secrets.AI_DAILY_API }}
          AI_DAILY_KEY: ${{ secrets.AI_DAILY_KEY }}
          AI_DAILY_MODEL: ${{ secrets.AI_DAILY_MODEL }}
          AI_DAILY_HOURS_WINDOW: ${{ secrets.AI_DAILY_HOURS_WINDOW }}
          AI_DAILY_FALLBACK_HOURS_WINDOW: ${{ secrets.AI_DAILY_FALLBACK_HOURS_WINDOW }}
          AI_DAILY_MAX_CANDIDATES: ${{ secrets.AI_DAILY_MAX_CANDIDATES }}
          AI_DAILY_GENERATE_MAX_RETRIES: ${{ secrets.AI_DAILY_GENERATE_MAX_RETRIES }}
          AI_DAILY_GENERATE_RETRY_DELAY_MS: ${{ secrets.AI_DAILY_GENERATE_RETRY_DELAY_MS }}
          AI_DAILY_ALLOW_TEMPLATE_PUBLISH: ${{ secrets.AI_DAILY_ALLOW_TEMPLATE_PUBLISH }}
          AI_DAILY_DEFAULT_COVER: ${{ secrets.AI_DAILY_DEFAULT_COVER }}
          AI_DAILY_NOTION_TITLE_PROPERTY: ${{ secrets.AI_DAILY_NOTION_TITLE_PROPERTY }}
          AI_DAILY_NOTION_TYPE_PROPERTY: ${{ secrets.AI_DAILY_NOTION_TYPE_PROPERTY }}
          AI_DAILY_NOTION_STATUS_PROPERTY: ${{ secrets.AI_DAILY_NOTION_STATUS_PROPERTY }}
          AI_DAILY_NOTION_DATE_PROPERTY: ${{ secrets.AI_DAILY_NOTION_DATE_PROPERTY }}
          AI_DAILY_NOTION_SLUG_PROPERTY: ${{ secrets.AI_DAILY_NOTION_SLUG_PROPERTY }}
          AI_DAILY_NOTION_SUMMARY_PROPERTY: ${{ secrets.AI_DAILY_NOTION_SUMMARY_PROPERTY }}
          AI_DAILY_NOTION_TAGS_PROPERTY: ${{ secrets.AI_DAILY_NOTION_TAGS_PROPERTY }}
          AI_DAILY_NOTION_CATEGORY_PROPERTY: ${{ secrets.AI_DAILY_NOTION_CATEGORY_PROPERTY }}
          AI_DAILY_NOTION_ICON_PROPERTY: ${{ secrets.AI_DAILY_NOTION_ICON_PROPERTY }}
          AI_DAILY_NOTION_COVER_PROPERTY: ${{ secrets.AI_DAILY_NOTION_COVER_PROPERTY }}
          AI_DAILY_NOTION_PASSWORD_PROPERTY: ${{ secrets.AI_DAILY_NOTION_PASSWORD_PROPERTY }}
          AI_DAILY_NOTION_AI_SUMMARY_PROPERTY: ${{ secrets.AI_DAILY_NOTION_AI_SUMMARY_PROPERTY }}
          QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
          QINIU_REGION: ${{ secrets.QINIU_REGION }}
          QINIU_UPLOAD_URL: ${{ secrets.QINIU_UPLOAD_URL }}
          QINIU_PUBLIC_BASE_URL: ${{ secrets.QINIU_PUBLIC_BASE_URL }}
          QINIU_KEY_PREFIX: ${{ secrets.QINIU_KEY_PREFIX }}
          AI_DAILY_IMAGE_QINIU_KEY_PREFIX: ${{ secrets.AI_DAILY_IMAGE_QINIU_KEY_PREFIX }}
        run: npm run ai-daily:run

